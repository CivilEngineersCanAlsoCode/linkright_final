# Linkright ChromaDB Configuration
# Version: 1.0.0

database:
  host: "${CHROMADB_HOST}"
  port: 8000
  tenant: "default_tenant"
  database: "default_database"
  fallback_mode: "file-based"

embeddings:
  model: "text-embedding-3-small"
  dimensions: 1536

collections:
  - name: "sync_signals"
    description: "Vector embeddings of career signals for semantic retrieval"
    hnsw_space: "cosine"

  - name: "optimization_results"
    description: "Successful optimization patterns and historical uplift"
    hnsw_space: "l2"

  - name: "qa_patterns"
    description: "TEA module quality assurance and testing patterns"
    hnsw_space: "cosine"
