# Linkright MongoDB Configuration
# Version: 1.0.0

database:
  name: "linkright_career"
  host: "${MONGODB_HOST}"
  port: 27017
  fallback_mode: "memory"

collections:
  - name: "career_signals"
    description: "Atomic career events and professional evidence"
    indexes:
      - field: "signal_id"
        unique: true
      - field: "type"
    ttl_days: 0  # Permanent

  - name: "workflow_history"
    description: "Execution logs and state snapshots for all workflows"
    indexes:
      - field: "session_id"
      - field: "workflow_id"
    ttl_days: 90 # Auto-archive after 3 months
