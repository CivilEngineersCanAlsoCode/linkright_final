name: content-automation
description: "Automated content generation for flex publicist"
config_source: "{project-root}/_lr/_config/manifest.yaml"
installed_path: "{project-root}/_lr/flex/workflows/content-automation"
instructions: "{installed_path}/instructions.md"
validation: "{installed_path}/checklist.md"
template: "{installed_path}/templates/content.template.md"
input_file_patterns:
  themes:
    pattern: "data/themes.yaml"
    strategy: FULL_LOAD
  past_performance:
    pattern: "data/analytics.csv"
    strategy: FULL_LOAD
