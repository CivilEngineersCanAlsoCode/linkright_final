# Linkright (lr) Global Configuration

system:
  name: Linkright
  version: 4.0
  identity: orchestrator
  mode: modular
  communication_language: English
  document_output_language: English

user:
  name: "Satvik Jain"
  bio: "Senior Software Engineer specializing in AI-driven automation, full-stack orchestration, and system optimization. Expert in building scalable, agentic workflows and high-performance backend systems."
  target_role: "Senior Software Engineer / AI Architect"
  target_companies: ["Google", "Spotify", "Amazon", "Anthropic", "OpenAI"]
  skills: ["Python", "Go", "TypeScript", "React", "Docker", "Kubernetes", "LLM Orchestration", "Dolt", "ChromaDB"]

modules:
  core:
    enabled: true
    path: _lr/core
  lrb:
    enabled: true
    path: _lr/lrb
  sync:
    enabled: true
    path: _lr/sync
  flex:
    enabled: true
    path: _lr/flex
  squick:
    enabled: true
    path: _lr/squick

data_layers:
  mongodb:
    config: _lr/core/config/mongodb-config.yaml
  chromadb:
    config: _lr/core/config/chromadb-config.yaml

distribution:
  settings:
    mode: professional
    target_platform: web
  airtable:
    url: "https://api.airtable.com/v0/appBASEID/SyncTable"
  postiz:
    url: "https://app.postiz.com/api/v1/posts"
