# Linkright Persistent Memories
# Define the memory layer and persistence rules for Linkright modules.

memory_governance:
  storage_type: "filesystem"
  root_path: "_lr/_memory/"
  persistence_strategy: "append-only-audit-log"

modules:
  core:
    memory_enabled: true
    retention_policy: "permanent"
  lrb:
    memory_enabled: true
    retention_policy: "permanent"
  sync:
    memory_enabled: true
    retention_policy: "project-cycle"
  flex:
    memory_enabled: true
    retention_policy: "campaign-cycle"
  squick:
    memory_enabled: true
    retention_policy: "enterprise-ship-cycle"
