name: quick-optimize
description: "Accelerated 5-step optimization for minor iterations"
config_source: "{project-root}/_lr/_config/manifest.yaml"
installed_path: "{project-root}/_lr/sync/workflows/quick-optimize"
instructions: "{installed_path}/instructions.md"
validation: "{installed_path}/checklist.md"
template: "{installed_path}/templates/quick-update.template.md"
input_file_patterns:
  jd_profile:
    pattern: "data/jd-profile.yaml"
    strategy: FULL_LOAD
  current_resume:
    pattern: "data/resume.md"
    strategy: FULL_LOAD
