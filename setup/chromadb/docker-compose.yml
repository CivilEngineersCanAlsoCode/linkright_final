services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: autonomous-dev-chromadb
    ports:
      - "8000:8000"
    volumes:
      # BIND MOUNT — NOT a Docker volume. Data persists at ~/.autonomous-dev/chromadb/data/
      # Survives: docker rm, docker uninstall, system restart
      # Only rm -rf ~/.autonomous-dev/chromadb/data/ destroys it
      - ${CHROMA_DATA_PATH:-./data}:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo -e \"GET /api/v2/heartbeat HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n\" > /dev/tcp/localhost/8000'"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
